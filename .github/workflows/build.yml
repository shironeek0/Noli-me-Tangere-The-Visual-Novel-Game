name: Build and Release LÖVE Game

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🧱 Install tools
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip unzip wget

      # 📦 Create .love file
      - name: Create .love package
        run: |
          zip -r game.love . -x "*.git*" ".github/*"

      # 💻 Download LÖVE (Windows)
      - name: Download LÖVE
        run: |
          wget https://github.com/love2d/love/releases/download/11.4/love-11.4-win64.zip
          unzip love-11.4-win64.zip

      # 🧩 Build .exe
      - name: Build Windows .exe
        run: |
          mkdir dist
          cp game.love dist/
          cat love-11.4-win64/love.exe game.love > dist/BALIK_TANAW:NoliMeTangere.exe
          cp -r love-11.4-win64/* dist/
          rm dist/love.exe

      # 📦 Zip build (important for release)
      - name: Zip build
        run: |
          cd dist
          zip -r BALIK_TANAW:NoliMeTangere-win64.zip .

      # 🚀 Create GitHub Release + upload .exe
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/BALIK_TANAW:NoliMeTangere.exe
            dist/BALIK_TANAW:NoliMeTangere.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}